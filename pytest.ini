[pytest]
# Register custom marks to suppress PytestUnknownMarkWarning.
# The `integration` mark is used in tests that require a live DATABASE_URL
# (test_nal_stv.py, test_atom_links.py, etc.). Without registration pytest
# warns on every test in those files — noisy in both local and CI runs.
markers =
    integration: Tests that require a live PostgreSQL DATABASE_URL.
